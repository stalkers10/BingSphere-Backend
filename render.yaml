databases:
  - name: mini-netflix-db
    plan: free
    databaseName: mininetflix
    user: mininetflix

services:
  - type: web
    runtime: python
    name: mini-netflix-api
    plan: free
    rootDir: Backend
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate --no-input
    startCommand: python -m gunicorn backend.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-netflix-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2