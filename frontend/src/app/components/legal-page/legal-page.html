<div class="legal-page">
  <header class="legal-header">
    <a class="legal-brand" routerLink="/login">Bingsphere</a>

    <div class="legal-header__actions">
      <button class="legal-chip legal-chip--ghost" type="button" (click)="goBack()">
        Back
      </button>
      <a class="legal-chip" [routerLink]="page.alternateRoute">{{ page.alternateLabel }}</a>
      <a class="legal-chip legal-chip--ghost" routerLink="/login">Sign In</a>
    </div>
  </header>

  <main class="legal-main">
    <section class="legal-hero">
      <div class="legal-hero__content">
        <span class="legal-eyebrow">{{ page.eyebrow }}</span>
        <h1>{{ page.title }}</h1>
        <p class="legal-hero__intro">{{ page.intro }}</p>

        <div class="legal-meta">
          <span>Effective {{ page.effectiveDate }}</span>
          <span>Applies to core account and streaming features</span>
        </div>
      </div>

      <aside class="legal-summary">
        <span class="legal-summary__label">Summary</span>
        <p>{{ page.summary }}</p>
      </aside>
    </section>

    <section class="legal-highlights">
      <article *ngFor="let item of page.highlights" class="legal-highlight">
        <h2>{{ item.title }}</h2>
        <p>{{ item.copy }}</p>
      </article>
    </section>

    <section class="legal-content">
      <article *ngFor="let section of page.sections" class="legal-section">
        <h2>{{ section.title }}</h2>
        <p *ngFor="let paragraph of section.paragraphs">{{ paragraph }}</p>
      </article>
    </section>
  </main>

  <app-footer></app-footer>
</div>
